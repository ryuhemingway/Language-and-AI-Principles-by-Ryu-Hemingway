name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  terminal-app:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python files
        run: python -m py_compile learn.py scripts/export_course_content.py scripts/generate_docs_media.py scripts/terminal_smoke.py

      - name: Run terminal smoke tests
        run: python scripts/terminal_smoke.py

      - name: Check generated course docs
        run: bash scripts/check_generated_docs.sh
